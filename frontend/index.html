<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>试纸色差检测系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>试纸色差检测系统</h1>
        </header>

        <section class="settings-panel">
            <h2>参数设置</h2>
            <div class="setting-item">
                <label>ΔE 阈值: <span id="threshold-value">10</span></label>
                <input type="range" id="threshold" min="0" max="30" value="10" step="1">
            </div>
            <div class="setting-item">
                <label>网格大小:</label>
                <input type="number" id="grid-size" min="3" max="50" value="10" step="1">
            </div>
        </section>

        <section class="upload-section">
            <h2>图片上传</h2>
            <div class="upload-area" id="upload-area">
                <input type="file" id="file-input" accept="image/*" style="display: none;">
                <p>拖拽图片到此处或点击上传</p>
            </div>
            <div class="preview" id="preview" style="display: none;">
                <img id="original-image" src="" alt="原始图片">
            </div>
            <button id="analyze-btn" disabled>开始视觉分析</button>
            <div class="loading" id="loading" style="display: none;">
                <div class="spinner"></div>
                <span>分析中...</span>
            </div>
        </section>

        <section class="visualization-section" id="visualization" style="display: none;">
            <h2>分步可视化展示</h2>
            <div class="steps-container" id="steps-container"></div>
        </section>

        <section class="result-section" id="result-section" style="display: none;">
            <h2>最终结果</h2>
            <div class="result-panel">
                <div class="result-card">
                    <h3>色差值 (ΔE)</h3>
                    <div class="result-value" id="delta-e-value">0</div>
                    <div class="result-label">变色区域平均色差</div>
                </div>
                <div class="result-card">
                    <h3>变色比例</h3>
                    <div class="result-value" id="ratio-value">0%</div>
                    <div class="result-label">变色区域占总面积</div>
                </div>
                <div class="result-status" id="result-status">
                    <span id="status-text"></span>
                    <p id="status-desc"></p>
                </div>
            </div>
        </section>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
